<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إكسا جروب | EXA Group - </title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #0f2027;
            --primary-medium: #203a43;
            --primary-light: #2c5364;
            --accent-gold: #ffd700;
            --accent-green: #27ae60;
            --accent-red: #e74c3c;
            --text-dark: #1e2a3e;
            --text-light: #4a627a;
            --bg-light: #f4f7f6;
            --card-bg: #ffffff;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg-light: #0b1418;
            --text-dark: #e0e0e0;
            --text-light: #b0b0b0;
            --card-bg: #16242a;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            transition: background 0.3s ease;
        }

        header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-medium));
            color: white;
            padding: 0.8rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .nav-container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area i { font-size: 2.2rem; color: var(--accent-gold); }
        .logo-text h1 { font-size: 1.5rem; font-weight: 800; line-height: 1; }
        .logo-text h1 span { color: var(--accent-gold); }

        .nav-links { display: flex; gap: 5px; }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            transition: var(--transition);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.15); color: var(--accent-gold); }

        .user-controls { display: flex; align-items: center; gap: 12px; }
        .dark-toggle { cursor: pointer; font-size: 1.3rem; color: var(--accent-gold); padding: 5px; }

        .main-content { margin-top: 100px; padding: 2rem; max-width: 1350px; margin-left: auto; margin-right: auto; min-height: 85vh; }
        .page { display: none; animation: slideUp 0.5s ease; }
        .page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* الإحصائيات */
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-item { background: var(--card-bg); border-radius: 20px; padding: 1.5rem; text-align: center; box-shadow: var(--card-shadow); border-bottom: 4px solid var(--accent-gold); }
        .stat-item b { font-size: 2.5rem; display: block; color: var(--primary-medium); }

        /* الكروت */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .exa-card { background: var(--card-bg); border-radius: 25px; overflow: hidden; box-shadow: var(--card-shadow); transition: var(--transition); display: flex; flex-direction: column; }
        .exa-card:hover { transform: translateY(-10px); }
        .card-banner { background: linear-gradient(45deg, var(--primary-dark), var(--primary-light)); height: 80px; }
        .user-img { width: 70px; height: 70px; background: #ddd; border-radius: 50%; border: 4px solid var(--card-bg); margin: -35px auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; position: relative; z-index: 2; }
        .card-content { padding: 1.5rem; text-align: center; flex-grow: 1; }
        .skill-tag { background: rgba(44, 83, 100, 0.1); color: var(--primary-light); padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; margin: 2px; display: inline-block; font-weight: 700; }

        .search-box { width: 100%; max-width: 500px; margin: 0 auto 2rem; position: relative; }
        .search-box input { width: 100%; padding: 12px 40px; border-radius: 25px; border: 1px solid #ddd; background: var(--card-bg); color: var(--text-dark); outline: none; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-light); }

        /* كود الدردشة المطلوب */
        .chat-container {
            height:600px;
            display:flex;
            flex-direction:column;
            background:var(--card-bg);
            border-radius:20px;
            overflow:hidden;
            box-shadow: var(--card-shadow);
        }
        .messages-area {
            flex:1;
            overflow-y:auto;
            padding:15px;
            display:flex;
            flex-direction:column;
            gap:10px;
            background: rgba(0,0,0,0.02);
        }
        .msg-bubble {
            max-width:70%;
            padding:10px 15px;
            border-radius:15px;
            font-size:14px;
            position: relative;
        }
        .msg-bubble small {
            display: block;
            font-weight: bold;
            font-size: 0.7rem;
            margin-bottom: 3px;
        }
        .sent {
            align-self:flex-end;
            background: var(--primary-light);
            color:#fff;
            border-bottom-left-radius: 2px;
        }
        .received {
            align-self:flex-start;
            background:#eee;
            color: #333;
            border-bottom-right-radius: 2px;
        }
        .msg-time {
            font-size:10px;
            opacity:0.6;
            margin-top:5px;
            text-align: left;
        }
        .sent .msg-time { text-align: right; color: #fff; }

        .chat-input-bar {
            display:flex;
            padding:15px;
            gap:10px;
            border-top:1px solid rgba(0,0,0,0.05);
            background: var(--card-bg);
        }
        .chat-input-bar input {
            flex:1;
            padding:12px;
            border-radius:25px;
            border:1px solid #ddd;
            background: var(--bg-light);
            color: var(--text-dark);
            outline: none;
        }
        .chat-input-bar button {
            width:45px;
            height: 45px;
            border-radius:50%;
            border: none;
            background: var(--primary-light);
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .typing-indicator {
            font-size:12px;
            padding:5px 15px;
            color: var(--accent-green);
            font-weight: bold;
            height: 25px;
        }

        /* الإدارة */
        .admin-section { max-width: 800px; margin: 0 auto; }
        .request-card { background: var(--card-bg); padding: 1rem 1.5rem; border-radius: 15px; margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--accent-gold); box-shadow: var(--card-shadow); }

        .map-frame { width: 100%; height: 400px; border-radius: 25px; border: 5px solid var(--card-bg); box-shadow: var(--card-shadow); overflow: hidden; }

        .btn { padding: 8px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-family: 'Cairo'; font-size: 0.85rem; }
        .btn-gold { background: var(--accent-gold); color: var(--primary-dark); }
        .btn-primary { background: var(--primary-light); color: white; }
        .btn-danger { background: var(--accent-red); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 0.75rem; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: var(--card-bg); padding: 2rem; border-radius: 25px; width: 90%; max-width: 400px; }
        .modal-box input, .modal-box textarea { width: 100%; padding: 10px; margin-bottom: 1rem; border-radius: 10px; border: 1px solid #ddd; background: var(--bg-light); color: var(--text-dark); font-family: 'Cairo'; }

        footer { background: var(--primary-dark); color: white; padding: 3rem 2rem; text-align: center; margin-top: 4rem; }
        .notification { position: fixed; bottom: 20px; left: 20px; padding: 12px 25px; border-radius: 30px; color: white; z-index: 9999; display: none; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo-area" onclick="showPage('home')">
            <i class="fas fa-atom"></i>
            <div class="logo-text"><h1>EXA <span>Group</span></h1></div>
        </div>
        <nav class="nav-links">
            <a onclick="showPage('home')" id="nav-home" class="active">🏠 الرئيسية</a>
            <a onclick="showPage('members')" id="nav-members">👥 الاعضاء</a>
            <a onclick="showPage('projects')" id="nav-projects">📁 المشاريع</a>
            <a onclick="showPage('chat')" id="nav-chat">💬 القعدة</a>
            <a onclick="showPage('map')" id="nav-map">📍 المقر</a>
            <a id="adminLink" onclick="showPage('admin')" style="display: none; color: var(--accent-gold);">⚙️ القيادة</a>
        </nav>
        <div class="user-controls">
            <div class="dark-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
            <button class="btn btn-gold" id="loginBtn" onclick="openModal('loginModal')">دخول</button>
            <button class="btn btn-danger" id="logoutBtn" onclick="handleLogout()" style="display: none;">خروج</button>
        </div>
    </div>
</header>

<div class="main-content">
    
    <!-- الرئيسية -->
    <div id="home-page" class="page active">
        <div class="stats-bar">
            <div class="stat-item"><b>0</b><p id="stat-m">عضو</p></div>
            <div class="stat-item"><b>0</b><p id="stat-p">مشروع</p></div>
            <div class="stat-item"><b>0</b><p id="stat-c">رسالة</p></div>
        </div>
        <div class="map-frame">
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d217.27324478096082!2d31.005783341238526!3d29.388674340832157!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14599b099e59b309%3A0xcb94aa163351156b!2sEXA%20Group!5e0!3m2!1sen!2seg!4v1774813229575!5m2!1sen!2seg" width="100%" height="100%" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>

    <!-- الوحوش -->
    <div id="members-page" class="page">
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="mSearch" placeholder="ابحث بالاسم أو المهارة..." onkeyup="filterMembers()"></div>
        <div class="grid-container" id="membersGrid"></div>
    </div>

    <!-- المشاريع -->
    <div id="projects-page" class="page">
        <div style="text-align: center; margin-bottom: 2rem;"><button class="btn btn-primary" id="addProjectBtn" style="display: none;" onclick="openModal('projectModal')">➕ مشروع جديد</button></div>
        <div class="grid-container" id="projectsGrid"></div>
    </div>

    <!-- المقر -->
    <div id="map-page" class="page">
        <div class="map-frame">
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d217.27324478096082!2d31.005783341238526!3d29.388674340832157!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14599b099e59b309%3A0xcb94aa163351156b!2sEXA%20Group!5e0!3m2!1sen!2seg!4v1774813229575!5m2!1sen!2seg" width="100%" height="100%" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>

    <!-- الدردشة المحدثة -->
    <div id="chat-page" class="page">
        <div class="chat-container">
            <div class="messages-area" id="chatBox"></div>
            <div id="typing" class="typing-indicator"></div>
            <div class="chat-input-bar">
                <input type="text" id="msgInput" placeholder="اكتب رسالتك..." disabled />
                <button onclick="handleSendMessage()" id="sendBtn" disabled>➤</button>
            </div>
        </div>
    </div>

    <!-- الإدارة -->
    <div id="admin-page" class="page"><div class="admin-section" id="pendingUsersList"></div></div>
</div>

<!-- مودالات -->
<div id="loginModal" class="modal-overlay"><div class="modal-box">
    <h3>🔐 دخول</h3>
    <input type="email" id="logEmail" placeholder="الايميل">
    <input type="password" id="logPass" placeholder="الباسورد">
    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">دخول</button>
    <p style="text-align:center; margin-top:10px">جديد؟ <a href="#" onclick="openRegister()">سجل هنا</a></p>
    <button class="btn btn-danger" style="width:100%; margin-top:5px" onclick="closeModal('loginModal')">إلغاء</button>
</div></div>

<div id="registerModal" class="modal-overlay"><div class="modal-box">
    <h3>📝 تسجيل</h3>
    <input type="text" id="regName" placeholder="الاسم الكامل">
    <input type="email" id="regEmail" placeholder="الايميل">
    <input type="password" id="regPass" placeholder="الباسورد">
    <input type="text" id="regSkills" placeholder="مهاراتك">
    <button class="btn btn-primary" style="width:100%" onclick="handleRegister()">طلب انضمام</button>
    <button class="btn btn-danger" style="width:100%; margin-top:5px" onclick="closeModal('registerModal')">إلغاء</button>
</div></div>

<div id="projectModal" class="modal-overlay"><div class="modal-box">
    <h3>➕ نشر مشروع</h3>
    <input type="text" id="pName" placeholder="اسم المشروع">
    <textarea id="pDesc" rows="3" placeholder="وصف المشروع"></textarea>
    <input type="url" id="pLink" placeholder="رابط المشروع">
    <button class="btn btn-primary" style="width:100%" onclick="handleAddProject()">نشر</button>
    <button class="btn btn-danger" style="width:100%; margin-top:5px" onclick="closeModal('projectModal')">إلغاء</button>
</div></div>

<div id="notification" class="notification"></div>

<footer>
    <h2 style="color: var(--accent-gold);">EXA Group</h2>
    <p>القائد والمؤسس: الباشمبرمج محمد إيهاب</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD12Lp0Mv8C6OStGwpPmHpi6-vjwvF2Q2U",
        authDomain: "exa-group.firebaseapp.com",
        projectId: "exa-group",
        storageBucket: "exa-group.firebasestorage.app",
        messagingSenderId: "304049809292",
        appId: "1:304049809292:web:846b683f3c1765389518a9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);

    let userProfile = null;
    const ADMIN_EMAIL = 'elpoppr2010@gmail.com';

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
        document.getElementById(id + '-page').classList.add('active');
        if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
        if(id === 'home') updateStats();
        if(id === 'members') loadMembers();
        if(id === 'projects') loadProjects();
        if(id === 'admin') loadPendingUsers();
    };

    window.openModal = (id) => {
        // 
        if(id === 'projectModal') {
            const modal = document.getElementById(id);
            delete modal.dataset.editId;
            document.getElementById('pName').value = '';
            document.getElementById('pDesc').value = '';
            document.getElementById('pLink').value = '';
        }
        document.getElementById(id).style.display = 'flex';
    };
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.openRegister = () => { closeModal('loginModal'); openModal('registerModal'); };
    window.toggleDarkMode = () => document.body.classList.toggle('dark-mode');

    function toast(msg, type = 'success') {
        const t = document.getElementById('notification');
        t.innerText = msg;
        t.style.background = type === 'error' ? '#e74c3c' : '#27ae60';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                userProfile = snap.data();
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
                if(userProfile.status === 'approved') {
                    document.getElementById('msgInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    document.getElementById('addProjectBtn').style.display = 'inline-flex';
                }
                if(user.email === ADMIN_EMAIL) document.getElementById('adminLink').style.display = 'block';
            }
        } else {
            userProfile = null;
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('adminLink').style.display = 'none';
        }
        updateStats(); loadMembers(); loadProjects(); loadChat();
    });

    window.handleRegister = async () => {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const skills = document.getElementById('regSkills').value;

        const q = query(collection(db, "users"), where("email", "==", email));
        const check = await getDocs(q);
        if(!check.empty) return toast("هذا البريد مسجل مسبقاً!", "error");

        try {
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "users", cred.user.uid), {
                uid: cred.user.uid, name, email,
                skills: skills ? skills.split(',') : [],
                status: 'pending', role: 'member'
            });
            toast("تم تقديم طلبك بنجاح");
            closeModal('registerModal');
        } catch (e) { toast("خطأ في التسجيل", "error"); }
    };

    window.handleLogin = async () => {
        const email = document.getElementById('logEmail').value;
        const pass = document.getElementById('logPass').value;
        try { await signInWithEmailAndPassword(auth, email, pass); closeModal('loginModal'); } 
        catch (e) { toast("خطأ في الدخول", "error"); }
    };

    window.handleLogout = () => signOut(auth);

    async function updateStats() {
        const u = await getDocs(query(collection(db, "users"), where("status", "==", "approved")));
        const p = await getDocs(collection(db, "projects"));
        document.querySelectorAll('.stat-item b')[0].innerText = u.size;
        document.querySelectorAll('.stat-item b')[1].innerText = p.size;
    }

    async function loadMembers() {
        const snap = await getDocs(query(collection(db, "users"), where("status", "==", "approved")));
        const grid = document.getElementById('membersGrid');
        grid.innerHTML = "";
        snap.forEach(d => {
            const u = d.data();
            grid.innerHTML += `<div class="exa-card">
                <div class="card-banner"></div>
                <div class="user-img"><i class="fas fa-user-ninja"></i></div>
                <div class="card-content"><h3>${u.name}</h3>
                ${(u.skills || []).map(s => `<span class="skill-tag">${s.trim()}</span>`).join('')}</div>
            </div>`;
        });
    }

    window.filterMembers = () => {
        const term = document.getElementById('mSearch').value.toLowerCase();
        document.querySelectorAll('#membersGrid .exa-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(term) ? "flex" : "none";
        });
    };

    async function loadProjects() {
        const snap = await getDocs(collection(db, "projects"));
        const grid = document.getElementById('projectsGrid');
        grid.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            const isAdmin = auth.currentUser?.email === ADMIN_EMAIL;
            const isOwner = p.authorId === auth.currentUser?.uid;
            grid.innerHTML += `<div class="exa-card">
                <div class="card-banner" style="background:var(--primary-medium)"></div>
                <div class="card-content"><h3>${p.name}</h3><p>${p.desc}</p>
                ${p.link ? `<a href="${p.link}" target="_blank" class="btn btn-gold" style="width:100%; margin-top:10px">🔗 معاينة</a>` : ''}</div>
                ${(isAdmin || isOwner) ? `<div style="padding:10px; border-top:1px solid #eee; display:flex; gap:5px">
                    <button class="btn btn-primary btn-sm" data-id="${d.id}" data-name="${p.name}" data-desc="${p.desc}" data-link="${p.link || ''}" onclick="openEditBtn(this)">تعديل</button>
                    <button class="btn btn-danger btn-sm" data-id="${d.id}" onclick="handleDelete(this.dataset.id)">حذف</button>
                </div>` : ''}
            </div>`;
        });
    }

    // 
    window.openEditBtn = (btn) => {
        const docId = btn.dataset.id;
        const name = btn.dataset.name;
        const desc = btn.dataset.desc;
        const link = btn.dataset.link;
        
        document.getElementById('pName').value = name;
        document.getElementById('pDesc').value = desc;
        document.getElementById('pLink').value = link;
        document.getElementById('projectModal').dataset.editId = docId;
        openModal('projectModal');
    };

    // 
    window.openEdit = (docId, name, desc, link) => {
        document.getElementById('pName').value = name;
        document.getElementById('pDesc').value = desc;
        document.getElementById('pLink').value = link || '';
        document.getElementById('projectModal').dataset.editId = docId;
        openModal('projectModal');
    };

    //   
    window.handleDelete = async (docId) => {
        if(confirm("أنت متأكد من حذف المشروع؟")) {
            try {
                await deleteDoc(doc(db, "projects", docId));
                toast("تم الحذف بنجاح");
                loadProjects();
            } catch (e) {
                toast("خطأ في الحذف", "error");
            }
        }
    };

    // 
    window.handleAddProject = async () => {
        const name = document.getElementById('pName').value;
        const desc = document.getElementById('pDesc').value;
        const link = document.getElementById('pLink').value;
        const projectModal = document.getElementById('projectModal');
        const editId = projectModal.dataset.editId || null;

        if(!name || !desc) return toast("امضي يا اشول", "error");

        try {
            if(editId && editId !== 'undefined') {
                // 
                console.log("تعديل المشروع:", editId);
                await updateDoc(doc(db, "projects", editId), { name, desc, link });
                toast("تم التعديل بنجاح");
                delete projectModal.dataset.editId;
            } else {
                // 
                console.log("إضافة مشروع جديد");
                await addDoc(collection(db, "projects"), { 
                    name, desc, link, 
                    authorId: auth.currentUser.uid,
                    createdAt: new Date()
                });
                toast("تم النشر بنجاح");
            }
            closeModal('projectModal');
            // 
            document.getElementById('pName').value = '';
            document.getElementById('pDesc').value = '';
            document.getElementById('pLink').value = '';
            delete projectModal.dataset.editId;
            loadProjects();
        } catch (e) {
            console.error("خطأ:", e);
            toast("خطأ في العملية: " + e.message, "error");
        }
    };

    // --- كود الدردشة ---

    window.handleSendMessage = async () => {
        if (!auth.currentUser) return;
        const text = document.getElementById('msgInput').value;
        if(!text) return;

        await push(ref(rtdb,'messages'),{
            text,
            sender: userProfile ? userProfile.name : "وحش مجهول",
            uid: auth.currentUser.uid,
            time: Date.now()
        });

        await set(ref(rtdb,'typing/'+auth.currentUser.uid),false);
        document.getElementById('msgInput').value="";
    };

    const input = document.getElementById('msgInput');
    input.addEventListener('input', async ()=>{
        if (!auth.currentUser) return;
        await set(ref(rtdb,'typing/'+auth.currentUser.uid),true);
        setTimeout(()=>{
            set(ref(rtdb,'typing/'+auth.currentUser.uid),false);
        },1500);
    });

    function loadChat() {
        // 
        onValue(ref(rtdb,'typing'), snap => {
            let typingText="";
            snap.forEach(child => {
                if(auth.currentUser && child.key !== auth.currentUser.uid && child.val()){
                    typingText="✍️ حد بيكتب الآن...";
                }
            });
            document.getElementById('typing').innerText = typingText;
        });

        //
        onValue(ref(rtdb,'messages'), snap => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            let count = 0;
            snap.forEach(c => {
                const m = c.val();
                count++;
                const isMe = auth.currentUser && m.uid === auth.currentUser.uid;
                const time = new Date(m.time).toLocaleTimeString('ar-EG',{ hour:'2-digit', minute:'2-digit' });

                box.innerHTML += `
                    <div class="msg-bubble ${isMe?'sent':'received'}">
                        <small>${m.sender || 'وحش'}</small>
                        <div>${m.text}</div>
                        <div class="msg-time">${time}</div>
                    </div>
                `;
            });
            document.querySelectorAll('.stat-item b')[2].innerText = count;
            box.scrollTop = box.scrollHeight;
        });
    }

    async function loadPendingUsers() {
        if(auth.currentUser?.email !== ADMIN_EMAIL) return;
        const snap = await getDocs(query(collection(db, "users"), where("status", "==", "pending")));
        const list = document.getElementById('pendingUsersList');
        list.innerHTML = snap.empty ? "لا يوجد طلبات" : "";
        snap.forEach(d => {
            const u = d.data();
            list.innerHTML += `<div class="request-card">
                <div><b>${u.name}</b><br><small>${u.email}</small></div>
                <button class="btn btn-gold" onclick="approveUser('${d.id}')">قبول</button>
            </div>`;
        });
    }

    window.approveUser = async (docId) => {
        try {
            await updateDoc(doc(db, "users", docId), { status: 'approved' });
            toast("تم القبول"); loadPendingUsers(); updateStats();
        } catch (e) { toast("خطأ في القبول", "error"); }
    };
</script>
</body>
</html>
